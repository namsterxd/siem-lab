services:
  elasticsearch:
    profiles: ["core"]
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: siem-lab-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
    ports:
      - "${ES_PORT}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u elastic:${ELASTIC_PASSWORD} http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s

  stack-setup:
    profiles: ["core"]
    image: curlimages/curl:8.12.1
    container_name: siem-lab-stack-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
    command:
      - sh
      - -c
      - >
        until curl -fsS -u elastic:${ELASTIC_PASSWORD}
        http://elasticsearch:9200/_security/_authenticate >/dev/null; do
        sleep 5;
        done;
        curl -fsS -X POST -u elastic:${ELASTIC_PASSWORD}
        -H 'Content-Type: application/json'
        http://elasticsearch:9200/_security/user/kibana_system/_password
        -d "{\"password\":\"${KIBANA_SYSTEM_PASSWORD}\"}";

  kibana:
    profiles: ["core"]
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: siem-lab-kibana
    depends_on:
      stack-setup:
        condition: service_completed_successfully
    environment:
      SERVER_NAME: siem-lab-kibana
      SERVER_PUBLICBASEURL: http://localhost:5601
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY}
      XPACK_REPORTING_ENCRYPTIONKEY: ${REPORTING_ENCRYPTION_KEY}
      XPACK_SECURITY_ENCRYPTIONKEY: ${SECURITY_SESSION_KEY}
      TELEMETRY_ENABLED: "false"
      XPACK_FLEET_AGENTS_ENABLED: "false"
    ports:
      - "${KIBANA_PORT}:5601"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  juice-shop:
    profiles: ["web-vuln"]
    image: bkimminich/juice-shop@sha256:e150d920d36ae7d50897df991f6f37ce1338bfc37d05c4c304ab1dc6cdc87227
    container_name: siem-lab-juice-shop
    restart: unless-stopped
    expose:
      - "3000"

  web-gateway:
    profiles: ["web-vuln"]
    image: nginx:1.27-alpine
    container_name: siem-lab-web-gateway
    depends_on:
      - juice-shop
    ports:
      - "${JUICE_SHOP_PORT}:8080"
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  es-data:
